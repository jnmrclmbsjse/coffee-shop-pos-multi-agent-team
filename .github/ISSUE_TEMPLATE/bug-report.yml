name: Bug
description: Filed by QA when a story fails acceptance testing
title: "[BUG] "
labels: ["type:bug", "agent:dev"]
body:
  - type: input
    id: parent-story
    attributes:
      label: Blocks Story
      description: Issue number this bug blocks (e.g. #124)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro Steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ["Blocker", "Major", "Minor"]
    validations:
      required: true
