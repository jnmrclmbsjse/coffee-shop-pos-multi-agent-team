name: Bug
description: Filed by QA when a story fails acceptance testing
title: "[BUG] "
# NOTE: this template deliberately applies NO `agent:*` routing label.
# Routing labels are what the poller dispatches on — applying one at
# creation makes an issue eligible for pickup before its gating
# conditions are met (e.g. a QA task picked up before its dev tasks
# merged, or a blocked dev task dispatched early). Agents/scripts apply
# `agent:*` deliberately when the work is actually ready.
labels: ["type:bug"]
body:
  - type: input
    id: parent-story
    attributes:
      label: Blocks Story
      description: Issue number this bug blocks (e.g. #124)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro Steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ["Blocker", "Major", "Minor"]
    validations:
      required: true