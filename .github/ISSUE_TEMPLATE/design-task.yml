name: Design Task
description: UI/UX task, created during In Preparation
title: "[DESIGN] "
# NOTE: this template deliberately applies NO `agent:*` routing label.
# Routing labels are what the poller dispatches on — applying one at
# creation makes an issue eligible for pickup before its gating
# conditions are met (e.g. a QA task picked up before its dev tasks
# merged, or a blocked dev task dispatched early). Agents/scripts apply
# `agent:*` deliberately when the work is actually ready.
labels: ["type:design-task"]
body:
  - type: input
    id: parent-story
    attributes:
      label: Parent User Story
      description: Issue number (e.g. #124)
    validations:
      required: true
  - type: textarea
    id: screens
    attributes:
      label: Screens Needed
  - type: textarea
    id: tokens
    attributes:
      label: Design Tokens Needed
      description: New or modified tokens this task requires, if any
  - type: input
    id: output-link
    attributes:
      label: Output Link
      description: Filled by UI/UX once produced — Claude Design link / docs/design/mockups/ path